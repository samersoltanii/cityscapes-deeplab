server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # serve React SPA — all unknown routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # proxy API calls to backend so CORS is never an issue in production
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
